spring.application.name=gestion-academica

#Servidor
server.port=${SERVER_PORT:8080}

#Base de datos
spring.datasource.url=${DB_URI:jdbc:postgresql://localhost:5432/gestion_academica}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

#JPA - HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Jackson para fechas
spring.jackson.serialization.write-dates-as-timestamps=false